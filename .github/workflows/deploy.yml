# Deploy to Firebase Hosting + Firestore + Storage (Functions require Blaze plan)
# Setup: Add FIREBASE_TOKEN secret (run: firebase login:ci)
# Optional: Delete App Hosting backend - this project uses static Hosting, not App Hosting

name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          # Firebase config for aiads-f0675 (public). Override via repo Variables if using different project.
          VITE_FIREBASE_API_KEY: AIzaSyDL66XmXpMe5mXngpMNsl9aVBWUtb5dzGY
          VITE_FIREBASE_AUTH_DOMAIN: aiads-f0675.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: aiads-f0675
          VITE_FIREBASE_STORAGE_BUCKET: aiads-f0675.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "187388826909"
          VITE_FIREBASE_APP_ID: 1:187388826909:web:a0589e81f4208022eefdf4

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting,firestore:rules,storage --project aiads-f0675 --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
