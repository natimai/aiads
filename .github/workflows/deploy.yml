name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Google Auth (ADC) ──────────────────────────────────────────
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── Frontend Build ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── Firebase Deploy ────────────────────────────────────────────
      - name: Deploy Hosting + Firestore + Storage
        run: npx firebase-tools deploy --only hosting,firestore,storage --project aiads-f0675 --non-interactive

      - name: Set up Python 3.13 for Functions
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create venv and install Python dependencies
        working-directory: functions
        run: |
          python3.13 -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project aiads-f0675 --non-interactive --force

      - name: Set Cloud Run environment variables
        run: |
          gcloud run services update api \
            --region us-central1 \
            --project aiads-f0675 \
            --update-env-vars "\
          FRONTEND_URL=${{ secrets.FRONTEND_URL }},\
          META_APP_ID=${{ secrets.META_APP_ID }},\
          META_APP_SECRET=${{ secrets.META_APP_SECRET }},\
          TOKEN_ENCRYPTION_KEY=${{ secrets.TOKEN_ENCRYPTION_KEY }},\
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }},\
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }},\
          SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }},\
          ALERT_EMAIL_FROM=${{ secrets.ALERT_EMAIL_FROM }},\
          ALERT_EMAIL_TO=${{ secrets.ALERT_EMAIL_TO }}" \
            --quiet
